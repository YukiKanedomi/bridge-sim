<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" shape-rendering="crispEdges">
  <!-- Bridge Sim アイコン: ドット絵のBridgeビル（16px=1ドットのグリッド） -->
  <rect width="512" height="512" fill="#9cd4e4"/>
  <!-- 太陽（角飾り・マスクで欠けてよい） -->
  <rect x="416" y="32" width="48" height="48" fill="#f8d858"/>
  <rect x="432" y="16" width="16" height="80" fill="#f8d858"/>
  <rect x="400" y="48" width="80" height="16" fill="#f8d858"/>
  <!-- 雲 -->
  <rect x="32" y="96" width="80" height="24" fill="#ffffff"/>
  <rect x="48" y="80" width="48" height="16" fill="#ffffff"/>
  <!-- 旗 -->
  <rect x="144" y="56" width="16" height="72" fill="#4a3828"/>
  <rect x="160" y="56" width="104" height="40" fill="#e85838"/>
  <rect x="176" y="68" width="72" height="16" fill="#f8ecd0"/>
  <!-- パラペット（屋上） -->
  <rect x="112" y="112" width="288" height="16" fill="#8c7858"/>
  <!-- 躯体 -->
  <rect x="112" y="128" width="16" height="320" fill="#c8a878"/>
  <rect x="128" y="128" width="256" height="320" fill="#f0dcb0"/>
  <rect x="384" y="128" width="16" height="320" fill="#b89058"/>
  <!-- 窓 3列×3段 -->
  <g fill="#58c8d8">
    <rect x="152" y="160" width="48" height="48"/><rect x="232" y="160" width="48" height="48"/><rect x="312" y="160" width="48" height="48"/>
    <rect x="152" y="232" width="48" height="48"/><rect x="232" y="232" width="48" height="48"/><rect x="312" y="232" width="48" height="48"/>
    <rect x="152" y="304" width="48" height="48"/><rect x="232" y="304" width="48" height="48"/><rect x="312" y="304" width="48" height="48"/>
  </g>
  <!-- 窓の下辺影 -->
  <g fill="#388898">
    <rect x="152" y="196" width="48" height="12"/><rect x="232" y="196" width="48" height="12"/><rect x="312" y="196" width="48" height="12"/>
    <rect x="152" y="268" width="48" height="12"/><rect x="232" y="268" width="48" height="12"/><rect x="312" y="268" width="48" height="12"/>
    <rect x="152" y="340" width="48" height="12"/><rect x="232" y="340" width="48" height="12"/><rect x="312" y="340" width="48" height="12"/>
  </g>
  <!-- 玄関 -->
  <rect x="216" y="376" width="80" height="72" fill="#4a3828"/>
  <rect x="228" y="388" width="56" height="60" fill="#88c0d8"/>
  <!-- 地面 -->
  <rect x="0" y="448" width="512" height="64" fill="#88b858"/>
  <rect x="0" y="448" width="512" height="12" fill="#68a048"/>
</svg>
